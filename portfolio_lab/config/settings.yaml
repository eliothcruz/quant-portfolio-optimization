# Global project settings
# All scripts read this file via src/utils/config.py

# Historical data window
start_date: "2019-01-01"
end_date: "2024-12-31"

# Price field to extract from Yahoo Finance
# Options: "Adj Close", "Close"
# Phase 1 uses "Adj Close" (split- and dividend-adjusted)
price_field: "Adj Close"

# Risk parameters
confidence_level: 0.95   # Used for VaR and TVaR calculations

# Portfolio constraints
allow_short: false        # Long-only in Phase 1

# Return frequency of the data
output_frequency: "daily"
